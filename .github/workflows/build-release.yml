name: build-release

on:
    release:
        types: [published]

permissions:
    contents: write

concurrency:
    group: build-release-${{ github.event.release.tag_name }}
    cancel-in-progress: false

jobs:
    electron:
        name: Electron (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        environment: remappr
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'

            - name: Install Linux build deps
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libudev-dev libusb-1.0-0-dev rpm libarchive-tools

            # usocket (Linux-only native, pulled by dbus-next) is patched to
            # declare os:[linux,darwin], so pnpm skips it on Windows as a
            # platform-mismatched optional dep — no need to drop ALL optionals
            # (which would also skip rollup/swc/lightningcss platform binaries).
            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Ensure the @remappr/* projects are fetched + linked before packaging
            # (postinstall also does this, but be explicit for the release build).
            - name: Fetch @remappr projects
              run: node scripts/link-remappr.cjs
              env:
                  REMAPPR_FIRMWARE_URL: ${{ vars.REMAPPR_FIRMWARE_URL }}
                  REMAPPR_UI_URL: ${{ vars.REMAPPR_UI_URL }}
                  REMAPPR_BUILDER_URL: ${{ vars.REMAPPR_BUILDER_URL }}
                  REMAPPR_GIT_TOKEN: ${{ secrets.REMAPPR_GIT_TOKEN }}

            - name: Build (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: pnpm run build:linux
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build (Windows)
              if: matrix.os == 'windows-latest'
              run: pnpm run build:win
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build (macOS)
              if: matrix.os == 'macos-latest'
              run: pnpm run build:mac
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # electron-builder's pnpm node-modules collector has twice shipped
            # an app.asar missing transitive runtime deps (debug -> ms, needed
            # by serialport: #143, and again via the 26.8.1 lockfile pin in
            # v0.0.16). Packaging succeeds anyway and the app only crashes on
            # end-user machines — assert the packaged dependency closure is
            # complete before uploading.
            - name: Verify packaged runtime dependencies
              shell: bash
              run: node scripts/check-asar-deps.cjs dist

            # The runner is arm64; the x64 half of the universal app comes
            # from prebuilds / cross-compiled rebuilds of node-hid and
            # @serialport/bindings-cpp. If an x64 binary is ever missing the
            # app would ship half-broken with no build error — assert every
            # native module is either a fat binary or a per-arch prebuild
            # pair before uploading.
            - name: Verify universal macOS native modules
              if: matrix.os == 'macos-latest'
              shell: bash
              run: |
                  APP=$(find dist -maxdepth 2 -type d -name '*.app' -path '*universal*' | head -1)
                  if [ -z "$APP" ]; then
                    echo "::error::No universal .app found under dist/"
                    exit 1
                  fi
                  echo "Checking native modules in $APP"
                  FAIL=0
                  FOUND=0
                  while IFS= read -r -d '' f; do
                    FOUND=1
                    case "$f" in
                      # Prebuilds for other OSes are never Mach-O and never
                      # load on macOS. Packaging excludes them (electron-builder
                      # files patterns); warn on stragglers instead of failing
                      # lipo on non-Mach-O files.
                      */prebuilds/*linux*|*/prebuilds/*win32*|*/prebuilds/*android*|*/prebuilds/*freebsd*)
                        echo "::warning::non-darwin prebuild packaged (should be excluded): $f"
                        ;;
                      # A darwin-x64+arm64 prebuild dir holds one fat binary —
                      # verify it with lipo like any regular file.
                      *darwin-x64+arm64*|*darwin-arm64+x64*|*darwin-universal*)
                        ARCHS=$(lipo -archs "$f" 2>/dev/null || echo "unreadable")
                        echo "$f -> $ARCHS"
                        case "$ARCHS" in
                          *x86_64*arm64*|*arm64*x86_64*) ;;
                          *)
                            echo "::error::not universal: $f ($ARCHS)"
                            FAIL=1
                            ;;
                        esac
                        ;;
                      # Per-arch prebuild dirs are single-arch by design —
                      # require the sibling arch to exist instead.
                      *darwin-x64*)
                        sib="${f//darwin-x64/darwin-arm64}"
                        if [ ! -f "$sib" ]; then
                          echo "::error::missing arm64 sibling for $f"
                          FAIL=1
                        fi
                        ;;
                      *darwin-arm64*)
                        sib="${f//darwin-arm64/darwin-x64}"
                        if [ ! -f "$sib" ]; then
                          echo "::error::missing x64 sibling for $f"
                          FAIL=1
                        fi
                        ;;
                      *)
                        ARCHS=$(lipo -archs "$f" 2>/dev/null || echo "unreadable")
                        echo "$f -> $ARCHS"
                        case "$ARCHS" in
                          *x86_64*arm64*|*arm64*x86_64*) ;;
                          *)
                            echo "::error::not universal: $f ($ARCHS)"
                            FAIL=1
                            ;;
                        esac
                        ;;
                    esac
                  done < <(find "$APP" -name '*.node' -print0)
                  if [ "$FOUND" -eq 0 ]; then
                    echo "::error::no .node native modules found in app — packaging layout changed?"
                    exit 1
                  fi
                  exit $FAIL

            - name: Upload electron artifacts
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  TAG="${{ github.event.release.tag_name }}"
                  shopt -s nullglob
                  ASSETS=()
                  for f in dist/*.AppImage dist/*.deb dist/*.rpm dist/*.pacman dist/*.tar.gz dist/*.snap dist/*.exe dist/*.msi dist/*.dmg; do
                    ASSETS+=("$f")
                  done
                  if [ ${#ASSETS[@]} -gt 0 ]; then
                    gh release upload "$TAG" "${ASSETS[@]}" --clobber --repo "$GITHUB_REPOSITORY"
                  else
                    echo "No electron artifacts found in dist/"
                  fi

    cleanup-old-binaries:
        name: Prune binaries from older releases
        needs: [electron]
        runs-on: ubuntu-latest
        steps:
            - name: Delete binary assets from prior releases
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CURRENT_TAG: ${{ github.event.release.tag_name }}
              run: |
                  set -e
                  echo "Current release tag: $CURRENT_TAG"
                  gh release list --limit 100 --repo "$GITHUB_REPOSITORY" --json tagName --jq '.[].tagName' \
                    | grep -v "^$CURRENT_TAG\$" \
                    | while read -r tag; do
                        echo "Inspecting release $tag"
                        gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' \
                          | grep -E '\.(AppImage|deb|exe|dmg|msi|zip|rpm|snap|pacman|tar\.gz|blockmap|sig)$' \
                          | while read -r asset; do
                              echo "  deleting $asset from $tag"
                              gh release delete-asset "$tag" "$asset" --yes --repo "$GITHUB_REPOSITORY" || true
                            done
                      done
