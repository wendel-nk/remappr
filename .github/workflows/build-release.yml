name: build-release

on:
    release:
        types: [published]

permissions:
    contents: write

concurrency:
    group: build-release-${{ github.event.release.tag_name }}
    cancel-in-progress: false

jobs:
    electron:
        name: Electron (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'

            - name: Install Linux build deps
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libudev-dev libusb-1.0-0-dev rpm libarchive-tools

            # usocket (Linux-only native, pulled by dbus-next) is patched to
            # declare os:[linux,darwin], so pnpm skips it on Windows as a
            # platform-mismatched optional dep — no need to drop ALL optionals
            # (which would also skip rollup/swc/lightningcss platform binaries).
            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: pnpm run build:linux
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build (Windows)
              if: matrix.os == 'windows-latest'
              run: pnpm run build:win
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build (macOS)
              if: matrix.os == 'macos-latest'
              run: pnpm run build:mac
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload electron artifacts
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  TAG="${{ github.event.release.tag_name }}"
                  shopt -s nullglob
                  ASSETS=()
                  for f in dist/*.AppImage dist/*.deb dist/*.rpm dist/*.pacman dist/*.tar.gz dist/*.snap dist/*.exe dist/*.msi dist/*.dmg dist/*.zip; do
                    ASSETS+=("$f")
                  done
                  if [ ${#ASSETS[@]} -gt 0 ]; then
                    gh release upload "$TAG" "${ASSETS[@]}" --clobber --repo "$GITHUB_REPOSITORY"
                  else
                    echo "No electron artifacts found in dist/"
                  fi

    cleanup-old-binaries:
        name: Prune binaries from older releases
        needs: [electron]
        runs-on: ubuntu-latest
        steps:
            - name: Delete binary assets from prior releases
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CURRENT_TAG: ${{ github.event.release.tag_name }}
              run: |
                  set -e
                  echo "Current release tag: $CURRENT_TAG"
                  gh release list --limit 100 --repo "$GITHUB_REPOSITORY" --json tagName --jq '.[].tagName' \
                    | grep -v "^$CURRENT_TAG\$" \
                    | while read -r tag; do
                        echo "Inspecting release $tag"
                        gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' \
                          | grep -E '\.(AppImage|deb|exe|dmg|msi|zip|rpm|snap|blockmap|sig)$' \
                          | while read -r asset; do
                              echo "  deleting $asset from $tag"
                              gh release delete-asset "$tag" "$asset" --yes --repo "$GITHUB_REPOSITORY" || true
                            done
                      done
