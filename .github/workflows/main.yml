# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
    # Runs on pushes targeting the default branch
    push:
        branches: ['main']

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow one concurrent deployment
concurrency:
    group: 'pages'
    cancel-in-progress: true

jobs:
    # Build runs in the `remappr` environment so the Fetch step can read
    # REMAPPR_GIT_TOKEN (an environment secret there) and clone the private
    # builder. The deploy job must use the `github-pages` environment, and a job
    # can only declare ONE environment — hence build + deploy are split (the
    # GitHub-recommended Pages pattern). Without this, a single github-pages job
    # sees no token and the builder falls back to the stub on remappr.com.
    build:
        environment: remappr
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
            - name: Set up pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
            - name: Set up Node
              uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'
            - name: Install dependencies
              # --ignore-scripts skips the electron-builder install-app-deps
              # postinstall, which tries to rebuild native modules (usb,
              # noble, etc.) that need system libs (libudev) the runner
              # doesn't have. Web build doesn't use those modules anyway.
              run: pnpm install --frozen-lockfile --ignore-scripts
            - name: Fetch @remappr projects
              run: node scripts/link-remappr.cjs
              env:
                  REMAPPR_FIRMWARE_URL: ${{ vars.REMAPPR_FIRMWARE_URL }}
                  REMAPPR_UI_URL: ${{ vars.REMAPPR_UI_URL }}
                  REMAPPR_BUILDER_URL: ${{ vars.REMAPPR_BUILDER_URL }}
                  REMAPPR_GIT_TOKEN: ${{ secrets.REMAPPR_GIT_TOKEN }}
            - name: Build
              run: pnpm build
            - name: Setup Pages
              uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
            - name: Upload artifact
              uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
              with:
                  # Upload dist folder
                  path: './dist'

    deploy:
        needs: build
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
