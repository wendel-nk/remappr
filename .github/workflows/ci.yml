name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

            - name: Set up pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

            - name: Set up Node
              uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'

            - name: Install dependencies
              # --ignore-scripts skips electron-builder install-app-deps
              # postinstall, which needs system libs (libudev, etc.) the
              # runner doesn't have. Web typecheck/lint/test don't use
              # native modules.
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Guard against daisyUI re-introduction
              run: |
                  if grep -rEn 'btn-|bg-base-|text-base-content|primary-content|\bnavbar\b|rounded-box|badge-' src/; then
                    echo "::error::daisyUI tokens or class names detected. Migrate to shadcn equivalents (see chore/shadcn-update branch history)."
                    exit 1
                  fi

            - name: Typecheck
              run: pnpm typecheck

            - name: Lint
              run: pnpm lint

            - name: Test
              run: pnpm test

            - name: Build (web)
              run: pnpm build
